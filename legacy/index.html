<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅色 · Bloom Picker</title>
    <meta name="description" content="Traditional colors with Taiwanese elegant names. 傳統色名，台灣口語，高貴優雅。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">跳至主要內容</a>
    <div id="bg" class="bg" aria-hidden="true"></div>

    <header class="header">
        <div class="header-top">
            <a href="#" class="logo" data-color="" aria-label="雅色，回到預設色">雅色</a>
            <div class="header-actions">
                <button type="button" id="random-btn" class="icon-btn" title="隨機選色">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"></path></svg>
                </button>
            </div>
        </div>
        <p class="tagline">高貴優雅</p>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜尋顏色 (名/拼音)..." aria-label="搜尋顏色">
            <span class="search-icon">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
        </div>
    </header>

    <main id="main-content" class="main" role="main">
        <section class="color-display" aria-live="polite" aria-atomic="true">
            <div class="display-main">
                <h1 id="color-name" class="color-name">群青</h1>
                <p id="color-name-ja" class="color-name-ja"></p>
                <div class="color-values">
                    <div class="value-row">
                        <span class="value-label">C</span>
                        <span id="c" class="value">—</span>
                        <span class="value-label">M</span>
                        <span id="m" class="value">—</span>
                        <span class="value-label">Y</span>
                        <span id="y" class="value">—</span>
                        <span class="value-label">K</span>
                        <span id="k" class="value">—</span>
                    </div>
                    <div class="value-row">
                        <span class="value-label">R</span>
                        <span id="r" class="value">—</span>
                        <span class="value-label">G</span>
                        <span id="g" class="value">—</span>
                        <span class="value-label">B</span>
                        <span id="b" class="value">—</span>
                    </div>
                    <div class="value-row">
                        <span class="value-label">H</span>
                        <span id="h-val" class="value">—</span>
                        <span class="value-label">S</span>
                        <span id="s-val" class="value">—</span>
                        <span class="value-label">L</span>
                        <span id="l-val" class="value">—</span>
                    </div>
                    <div class="value-row hex-row">
                        <span class="value-label">#</span>
                        <button type="button" id="hex" class="value value-hex" title="點擊複製色碼">—</button>
                        <div class="export-dropdown-wrap">
                            <button type="button" id="export-format-btn" class="export-format-btn" title="多格式匯出" aria-expanded="false">▾</button>
                            <div class="export-dropdown" id="export-dropdown">
                                <button type="button" class="export-opt" data-format="css">CSS 變數</button>
                                <button type="button" class="export-opt" data-format="scss">SCSS 變數</button>
                                <button type="button" class="export-opt" data-format="rgb">RGB</button>
                                <button type="button" class="export-opt" data-format="hsl">HSL</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- WCAG Contrast Checker -->
                <div class="wcag-checker" id="wcag-checker">
                    <div class="wcag-row">
                        <span class="wcag-sample wcag-white" id="wcag-white-sample">Aa</span>
                        <span class="wcag-ratio" id="wcag-white-ratio">—</span>
                        <span class="wcag-badge" id="wcag-white-aa" title="WCAG AA">AA —</span>
                        <span class="wcag-badge" id="wcag-white-aaa" title="WCAG AAA">AAA —</span>
                    </div>
                    <div class="wcag-row">
                        <span class="wcag-sample wcag-black" id="wcag-black-sample">Aa</span>
                        <span class="wcag-ratio" id="wcag-black-ratio">—</span>
                        <span class="wcag-badge" id="wcag-black-aa" title="WCAG AA">AA —</span>
                        <span class="wcag-badge" id="wcag-black-aaa" title="WCAG AAA">AAA —</span>
                    </div>
                    <p class="wcag-note">
                        這裡顯示這個顏色搭配白字與黑字的可讀性：
                        對比數值愈高愈清楚，<strong>AA / AAA</strong> 代表 WCAG 無障礙等級，
                        ✅ 表示適合一般介面與文字，❌ 則不建議拿來做主要文字顏色。
                    </p>
                </div>
            </div>

            <div class="color-variations" id="variations"></div>

            <!-- Color Harmony Section -->
            <div class="harmony-section" id="harmony-section">
                <h2 class="harmony-title">配色推薦</h2>
                <div class="harmony-grid" id="harmony-grid"></div>
            </div>

            <!-- Recommended Palettes Section -->
            <div class="palette-reco" id="palette-reco">
                <h2 class="palette-reco-title">推薦色票</h2>
                <div class="palette-reco-grid" id="palette-reco-grid"></div>
            </div>

            <div id="copy-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
        </section>

        <nav class="color-nav" aria-label="Color list">
            <div class="hue-filters" id="hue-filters" role="tablist" aria-label="色系篩選">
                <button type="button" class="hue-btn active" data-hue="all">全部</button>
                <button type="button" class="hue-btn" data-hue="red"><span class="hue-dot" style="background:#CB1B45"></span>紅</button>
                <button type="button" class="hue-btn" data-hue="orange"><span class="hue-dot" style="background:#E98B2A"></span>橙</button>
                <button type="button" class="hue-btn" data-hue="yellow"><span class="hue-dot" style="background:#FFB11B"></span>黃</button>
                <button type="button" class="hue-btn" data-hue="green"><span class="hue-dot" style="background:#227D51"></span>綠</button>
                <button type="button" class="hue-btn" data-hue="cyan"><span class="hue-dot" style="background:#00896C"></span>青</button>
                <button type="button" class="hue-btn" data-hue="blue"><span class="hue-dot" style="background:#005CAF"></span>藍</button>
                <button type="button" class="hue-btn" data-hue="purple"><span class="hue-dot" style="background:#66327C"></span>紫</button>
                <button type="button" class="hue-btn" data-hue="neutral"><span class="hue-dot" style="background:#828282"></span>灰</button>
            </div>
            <ul id="color-list" class="color-list"></ul>
        </nav>
    </main>

    <!-- Palette Drawer (Favorites) -->
    <div class="palette-drawer" id="palette-drawer">
        <div class="palette-header">
            <button type="button" class="palette-toggle" id="palette-toggle" title="展開/收合調色盤">
                <span class="palette-toggle-icon">♡</span>
                <span class="palette-label">我的調色盤</span>
                <span class="palette-count" id="palette-count">0</span>
            </button>
            <div class="palette-actions" id="palette-actions">
                <button type="button" class="palette-action-btn" id="export-css" title="匯出為 CSS 變數">CSS</button>
                <button type="button" class="palette-action-btn" id="export-json" title="匯出為 JSON">JSON</button>
                <button type="button" class="palette-action-btn palette-clear" id="palette-clear" title="清除全部收藏">清除</button>
            </div>
        </div>
        <div class="palette-colors" id="palette-colors"></div>
    </div>

    <footer class="footer">
        <p>© Bloom Picker. Designed for Precision. Colors from Nippon Traditions.</p>
    </footer>

    <script src="data/colors.js"></script>
    <script src="app.js"></script>
</body>
</html>
